<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h2>Forgot Password</h2>

<input type="text" id="username" placeholder="Enter Username"><br><br>

<button onclick="sendOTP()">Send OTP</button><br><br>

<input type="text" id="otp" placeholder="Enter OTP"><br><br>

<button onclick="verifyOTP()">Verify OTP</button><br><br>

<input type="password" id="newPassword" placeholder="New Password"><br><br>

<button onclick="resetPassword()">Reset Password</button>

<p id="msg"></p>

<script>
const BASE_URL = "https://hrm-system-eu3z.onrender.com";

let currentUser = "";

// -------------------
// SEND OTP
// -------------------
async function sendOTP() {
    const username = document.getElementById("username").value;
    currentUser = username;

    const res = await fetch(BASE_URL + "/send-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username })
    });

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;

    // For testing only
    if (data.otp) {
        alert("OTP: " + data.otp);
    }
}

// -------------------
// VERIFY OTP
// -------------------
async function verifyOTP() {
    const otp = document.getElementById("otp").value;

    const res = await fetch(BASE_URL + "/verify-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: currentUser,
            otp: otp
        })
    });

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;
}

// -------------------
// RESET PASSWORD
// -------------------
async function resetPassword() {
    const newPassword = document.getElementById("newPassword").value;

    const res = await fetch(BASE_URL + "/reset-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: currentUser,
            new_password: newPassword
        })
    });

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;

    if (res.status === 200) {
        alert("Password reset successful! Go to login.");
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
