<h1>Department Management</h1>

<input type="text" id="name" placeholder="Department Name">
<input type="text" id="description" placeholder="Description">
<button onclick="addDepartment()">Add</button>

<ul id="departmentList"></ul>

<hr>

<h2>Role Management</h2>

<input type="text" id="roleName" placeholder="Role Name">

<button onclick="addRole()">Add Role</button>

<ul id="roleList"></ul>
<hr>

<h2>Employee Management</h2>

<br><br>

<select id="departmentDropdown"></select>
<select id="roleDropdown"></select>

<br><br>

<input type="text" id="manager" placeholder="Manager">
