<!DOCTYPE html>
<html>
<head>
    <title>Department</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Department Management</h1>

<input id="name" placeholder="Department Name">
<input id="description" placeholder="Description">
<button onclick="addDepartment()">Add</button>

<ul id="departmentList"></ul>

<hr>

<h2>Role Management</h2>
<div class="card">
<input id="roleName" placeholder="Role Name">
<input id="roleDesc" placeholder="Description">
<button onclick="addRole()">Add Role</button>
</div>
<ul id="roleList"></ul>

<hr>

<h2>Employee Management</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="email" placeholder="Email">
<input id="mobile" placeholder="Mobile">

<br><br>

<select id="department"></select>
<select id="role"></select>

<br><br>

<input id="manager" placeholder="Manager">

<br><br>

<button onclick="addEmployee()">Save Employee</button>
<button onclick="goToTask()">Go to Task Module</button>

<ul id="employeeList"></ul>

<br>
<button onclick="logout()">Logout</button>
<button onclick="window.location.href='review.html'">Go to Review Module</button>

<script src="script.js"></script>

</body>
</html>
